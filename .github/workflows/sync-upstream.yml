name: Sync upstream ox_inventory

on:
  schedule:
    - cron: '23 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Merge overextended/ox_inventory
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Fetch and merge upstream
        id: merge
        shell: bash
        run: |
          set -euo pipefail

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git remote add upstream https://github.com/overextended/ox_inventory.git
          git fetch upstream main --tags

          upstream_sha="$(git rev-parse upstream/main)"
          echo "upstream_sha=${upstream_sha}" >> "$GITHUB_OUTPUT"

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            echo 'conflicted=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! git merge --no-edit upstream/main; then
            conflicts="$(git diff --name-only --diff-filter=U)"

            if [ -z "$conflicts" ]; then
              echo 'Merge failed without reporting conflicting files.' >&2
              exit 1
            fi

            git merge --abort
            {
              echo 'conflicts<<EOF'
              printf '%s\n' "$conflicts"
              echo 'EOF'
              echo 'changed=false'
              echo 'conflicted=true'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git push origin HEAD:main
          echo 'changed=true' >> "$GITHUB_OUTPUT"
          echo 'conflicted=false' >> "$GITHUB_OUTPUT"

      - name: Report merge conflicts
        if: steps.merge.outputs.conflicted == 'true'
        uses: actions/github-script@v7
        env:
          CONFLICTS: ${{ steps.merge.outputs.conflicts }}
          UPSTREAM_SHA: ${{ steps.merge.outputs.upstream_sha }}
        with:
          script: |
            const title = 'Upstream sync requires conflict resolution';
            const conflicts = process.env.CONFLICTS?.trim() || '(No conflicting filenames reported)';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The automatic merge from `overextended/ox_inventory:main` into this fork\'s `main` branch found conflicts.',
              '',
              `Upstream commit: \`${process.env.UPSTREAM_SHA}\``,
              '',
              'Conflicting files:',
              '```text',
              conflicts,
              '```',
              '',
              'Resolve these conflicts once, then run the **Sync upstream ox_inventory** workflow again.',
              `Workflow run: ${runUrl}`,
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.update({
                ...context.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                ...context.repo,
                title,
                body,
                labels: ['upstream-sync'],
              });
            }

      - name: Close resolved conflict issue
        if: steps.merge.outputs.conflicted != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Upstream sync requires conflict resolution';
            const { data: issues } = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              per_page: 100,
            });

            for (const issue of issues.filter((item) => item.title === title)) {
              await github.rest.issues.update({
                ...context.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

      - name: Fail when conflicts need resolution
        if: steps.merge.outputs.conflicted == 'true'
        run: exit 1
